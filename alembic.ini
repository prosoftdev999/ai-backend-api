# A generic, single-database Alembic configuration.

[alembic]
# Path to migration scripts.
script_location = alembic

# Add the project root to Python's import path.
prepend_sys_path = .

# Use the operating system path separator.
path_separator = os

# Database URL.
# This value is replaced at runtime inside alembic/env.py
# using settings.database_url from your .env file.
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@db:5432/ai_backend


[post_write_hooks]
# Optional hooks that can run after Alembic creates a migration.
# Leave empty for now.


# Logging configuration

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic


[logger_root]
level = WARN
handlers = console
qualname =


[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine


[logger_alembic]
level = INFO
handlers =
qualname = alembic


[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic


[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S